server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: sandbox-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: sandbox-backend
          __path__: /var/log/sandbox/*.log
    pipeline_stages:
      - json:
          expressions:
            level: log_level
            method: method
            endpoint: endpoint
            status: status_code
            request_id: request_id
      - labels:
          level:
          method:
          endpoint:
          status:
          request_id:
